<!DOCTYPE html>
<html lang="es-AR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crear cuenta de Cliente — Mi Río Primero</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0B0F14" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body class="app">
  <main style="max-width: 560px; margin: 0 auto; padding: 40px 20px 80px;">
    <a href="index.html" style="color:var(--text-muted); font-size:13px; text-decoration:none;">← Volver</a>
    <h1 style="font-family: var(--font-display); font-size: 40px; margin: 16px 0 4px;">Creá tu cuenta</h1>
    <p style="color: var(--text-muted); margin: 0 0 28px;">Solo necesitamos algunos datos para que los comercios puedan enviarte tus pedidos.</p>

    <form id="formRegistro" class="form panel">
      <div class="field">
        <label for="nombre">Nombre completo *</label>
        <input id="nombre" name="nombre" type="text" required autocomplete="name" />
      </div>

      <div class="field">
        <label for="direccion">Dirección completa *</label>
        <input id="direccion" name="direccion" type="text" placeholder="Calle, número, barrio" required autocomplete="street-address" />
      </div>

      <div class="field-row">
        <div class="field">
          <label for="edad">Edad *</label>
          <input id="edad" name="edad" type="number" min="13" max="110" required />
        </div>
        <div class="field">
          <label for="contacto">Teléfono de contacto *</label>
          <input id="contacto" name="contacto" type="tel" placeholder="+54 9 ..." required autocomplete="tel" />
        </div>
      </div>

      <div class="field">
        <label for="email">Email *</label>
        <input id="email" name="email" type="email" required autocomplete="email" />
      </div>

      <div class="field">
        <label for="password">Contraseña *</label>
        <input id="password" name="password" type="password" minlength="6" required autocomplete="new-password" />
      </div>

      <div class="field">
        <label for="foto">Foto de perfil (opcional)</label>
        <input id="foto" name="foto" type="file" accept="image/*" />
      </div>

      <p id="formError" class="form-error"></p>

      <button type="submit" id="submitBtn" class="btn btn--gold btn--block">Crear cuenta</button>
    </form>
  </main>

  <script type="module" src="js/registro-cliente.js"></script>
</body>
</html>
