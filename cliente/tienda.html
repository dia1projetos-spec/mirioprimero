<!DOCTYPE html>
<html lang="es-AR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tienda — Mi Río Primero</title>
  <link rel="icon" href="../icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/app.css" />
  <style>
    .tienda-slides-wrap { position: relative; }
    .tienda-slides { display:flex; overflow-x:auto; scroll-snap-type: x mandatory; scrollbar-width: none; }
    .tienda-slides::-webkit-scrollbar { display: none; }
    .tienda-slides img { width: 100%; flex-shrink:0; scroll-snap-align: start; aspect-ratio: 16/7; object-fit:cover; display:block; }
    @media (max-width: 640px) { .tienda-slides img { aspect-ratio: 4/3; } }
    .tienda-slides-wrap::after {
      content: "";
      position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(11,15,20,0) 55%, rgba(11,15,20,0.85) 100%);
      pointer-events: none;
    }
    .tienda-header {
      display: flex; align-items: flex-end; gap: 16px;
      padding: 0 clamp(16px,4vw,40px) 8px;
      margin-top: -46px; position: relative; z-index: 2;
    }
    .tienda-header__logo {
      width: 84px; height: 84px; border-radius: 50%; object-fit: cover;
      border: 3px solid var(--night); background: var(--panel-2); flex-shrink: 0;
    }
    .tienda-header__logo--placeholder {
      display:flex; align-items:center; justify-content:center;
      font-family: var(--font-display); font-size: 32px; color: var(--gold-soft);
    }
    .tienda-header__info { padding-bottom: 6px; }
    .tienda-header h1 { font-family: var(--font-display); font-size: 32px; margin: 0 0 4px; }
    .tienda-header__badge {
      display:inline-block; font-size:12px; padding:3px 10px; border-radius:999px;
      background: rgba(201,162,39,0.16); color: var(--gold-soft);
    }
    .categoria-producto-seccion { padding: 28px clamp(16px,4vw,40px) 0; }
    .categoria-producto-seccion h2 {
      font-family: var(--font-display); font-size: 22px; margin: 0 0 14px;
      color: var(--text-muted); letter-spacing: 0.02em;
    }
    .tienda-grid {
      display:flex; gap:14px; overflow-x:auto; padding-bottom: 8px;
      scroll-snap-type: x mandatory; scrollbar-width: none;
    }
    .tienda-grid::-webkit-scrollbar { display: none; }
    .tienda-grid:last-of-type { padding-bottom: 60px; }
    .prod-card {
      flex-shrink: 0; width: min(170px, 40vw); scroll-snap-align: start;
      background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius-md);
      overflow:hidden; transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }
    .prod-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 32px -16px rgba(0,0,0,0.55);
      border-color: rgba(201,162,39,0.4);
    }
    .prod-card__img-wrap { overflow: hidden; }
    .prod-card__img-wrap img { width:100%; height:140px; object-fit:cover; display:block; transition: transform 0.35s ease; }
    .prod-card:hover .prod-card__img-wrap img { transform: scale(1.08); }
    .prod-card__body { padding: 14px; }
    .prod-card__nombre { font-weight:700; margin: 0 0 4px; }
    .prod-card__precio { color: var(--gold-soft); font-weight:700; }

    .carrito-fab {
      position: fixed; left: 20px; bottom: 20px; z-index: 10;
      width: 56px; height: 56px; border-radius: 50%;
      background: linear-gradient(100deg, var(--gold-soft), var(--gold));
      border: none; cursor: pointer; font-size: 24px;
      box-shadow: 0 12px 26px -8px rgba(201,162,39,0.5);
    }
    .carrito-fab__badge {
      position: absolute; top: -4px; right: -4px;
      background: var(--danger); color: #fff; font-size: 11px; font-weight: 700;
      min-width: 20px; height: 20px; border-radius: 999px;
      display: flex; align-items: center; justify-content: center;
    }
    .carrito-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 0; border-bottom: 1px solid var(--line);
    }
    .carrito-item img { width: 48px; height: 48px; border-radius: 8px; object-fit: cover; flex-shrink: 0; }
    .carrito-item__info { flex: 1; min-width: 0; }
    .carrito-item__nombre { font-weight: 700; font-size: 14px; margin: 0; }
    .carrito-item__precio { font-size: 13px; color: var(--gold-soft); margin: 0; }
    .carrito-item__qty { display: flex; align-items: center; gap: 8px; }
    .carrito-item__qty button {
      width: 26px; height: 26px; border-radius: 50%; border: 1px solid var(--line);
      background: var(--panel); color: var(--text); cursor: pointer; font-size: 15px;
    }
    .carrito-item__quitar {
      background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 16px; padding: 4px;
    }
  </style>
</head>
<body class="app">
  <a href="../index.html" style="display:inline-block; margin:16px clamp(16px,4vw,40px) 0; color:var(--text-muted); font-size:13px; text-decoration:none;">← Volver al feed</a>

  <div class="tienda-slides-wrap">
    <div class="tienda-slides" id="tiendaSlides"></div>
  </div>
  <div class="tienda-header">
    <div id="tiendaLogoWrap"></div>
    <div class="tienda-header__info">
      <h1 id="tiendaNombre">Cargando...</h1>
      <span class="tienda-header__badge" id="tiendaCategoria" hidden></span>
    </div>
  </div>

  <div id="tiendaContenido"></div>

  <!-- Botón flotante del carrito -->
  <button class="carrito-fab" id="btnAbrirCarrito" hidden>
    🛒<span class="carrito-fab__badge" id="carritoBadge">0</span>
  </button>

  <!-- Modal: carrito -->
  <div class="modal-backdrop" id="modalCarrito" hidden>
    <div class="modal">
      <h2>Tu carrito</h2>
      <div id="carritoItems"></div>
      <p class="empty-state" id="carritoEmpty" hidden><span>Todavía no agregaste productos.</span></p>
      <p style="font-size:16px; margin:14px 0 0;">Subtotal: <strong id="carritoSubtotal" style="color:var(--gold-soft);"></strong></p>
      <div class="modal-actions">
        <button type="button" class="btn btn--outline" id="cerrarModalCarrito">Seguir comprando</button>
        <button type="button" class="btn btn--gold" id="btnContinuarCompra">Continuar →</button>
      </div>
    </div>
  </div>

  <!-- Modal: checkout (entrega, cupón, confirmar) -->
  <div class="modal-backdrop" id="modalCompra" hidden>
    <div class="modal">
      <h2>Confirmar pedido</h2>
      <form id="formCompra" class="form">
        <div id="checkoutResumen" style="color:var(--text-muted); font-size:14px;"></div>
        <div class="field">
          <label for="compraDelivery">Entrega</label>
          <select id="compraDelivery"></select>
        </div>
        <div class="field">
          <label for="compraCupon">Cupón (opcional)</label>
          <input id="compraCupon" placeholder="Ingresá el código si tenés uno" />
        </div>
        <p id="compraCuponMsg" class="form-success"></p>
        <p style="font-size:15px; margin:0;">Total: <strong id="compraTotal" style="color:var(--gold-soft);"></strong></p>
        <p id="compraError" class="form-error"></p>
        <div class="modal-actions">
          <button type="button" class="btn btn--outline" id="cerrarModalCompra">Volver al carrito</button>
          <button type="submit" class="btn btn--gold">Confirmar y avisar al negocio</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="../js/cliente-tienda.js"></script>
</body>
</html>
