<!DOCTYPE html>
<html lang="es-AR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tienda — Mi Río Primero</title>
  <link rel="icon" href="../icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/app.css" />
  <style>
    .tienda-slides { display:flex; overflow-x:auto; scroll-snap-type: x mandatory; scrollbar-width: none; }
    .tienda-slides::-webkit-scrollbar { display: none; }
    .tienda-slides img { width: 100%; flex-shrink:0; scroll-snap-align: start; aspect-ratio: 16/7; object-fit:cover; display:block; }
    @media (max-width: 640px) { .tienda-slides img { aspect-ratio: 4/3; } }
    .tienda-header { padding: 4px clamp(16px,4vw,40px) 8px; }
    .tienda-header h1 { font-family: var(--font-display); font-size: 34px; margin: 0 0 4px; }
    .tienda-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(200px,1fr)); gap:16px; padding: 8px clamp(16px,4vw,40px) 60px; }
    .prod-card { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius-md); overflow:hidden; }
    .prod-card img { width:100%; height:140px; object-fit:cover; }
    .prod-card__body { padding: 14px; }
    .prod-card__nombre { font-weight:700; margin: 0 0 4px; }
    .prod-card__precio { color: var(--gold-soft); font-weight:700; }
  </style>
</head>
<body class="app">
  <a href="../index.html" style="display:inline-block; margin:16px clamp(16px,4vw,40px) 0; color:var(--text-muted); font-size:13px; text-decoration:none;">← Volver al feed</a>

  <div class="tienda-slides" id="tiendaSlides"></div>
  <div class="tienda-header">
    <h1 id="tiendaNombre">Cargando...</h1>
    <p id="tiendaCategoria" style="color:var(--text-muted); margin:0;"></p>
  </div>

  <div class="tienda-grid" id="tiendaGrid"></div>

  <!-- Modal de compra -->
  <div class="modal-backdrop" id="modalCompra" hidden>
    <div class="modal">
      <h2 id="compraProductoNombre">Confirmar pedido</h2>
      <form id="formCompra" class="form">
        <p style="margin:0; color:var(--text-muted); font-size:14px;">Precio: <strong id="compraPrecioBase" style="color:var(--text);"></strong></p>
        <div class="field">
          <label for="compraDelivery">Entrega</label>
          <select id="compraDelivery"></select>
        </div>
        <div class="field">
          <label for="compraCupon">Cupón (opcional)</label>
          <input id="compraCupon" placeholder="Ingresá el código si tenés uno" />
        </div>
        <p id="compraCuponMsg" class="form-success"></p>
        <p style="font-size:15px; margin:0;">Total: <strong id="compraTotal" style="color:var(--gold-soft);"></strong></p>
        <p id="compraError" class="form-error"></p>
        <div class="modal-actions">
          <button type="button" class="btn btn--outline" id="cerrarModalCompra">Cancelar</button>
          <button type="submit" class="btn btn--gold">Confirmar y avisar al negocio</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="../js/cliente-tienda.js"></script>
</body>
</html>
