<!DOCTYPE html>
<html lang="es-AR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feed — Mi Río Primero</title>
  <link rel="manifest" href="../manifest.json" />
  <meta name="theme-color" content="#0B0F14" />
  <link rel="icon" href="../icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/app.css" />
  <style>
    .feed-topbar { display:flex; align-items:center; justify-content:space-between; padding:18px clamp(16px,4vw,40px); border-bottom:1px solid var(--line); position: sticky; top:0; background: var(--night); z-index: 5; }
    .feed-topbar__brand { font-family: var(--font-display); font-size: 22px; color: var(--gold-soft); }
    .feed-topbar__links { display:flex; gap:14px; align-items:center; font-size:13px; }
    .feed-topbar__links a, .feed-topbar__links button { color: var(--text-muted); text-decoration:none; background:none; border:none; cursor:pointer; font-family: var(--font-body); }
    .categorias-bar { display:flex; gap:10px; overflow-x:auto; padding: 16px clamp(16px,4vw,40px); }
    .categoria-chip { flex-shrink:0; padding:8px 16px; border-radius:999px; background: var(--panel); border:1px solid var(--line); font-size:13px; cursor:pointer; white-space:nowrap; }
    .categoria-chip.is-active { background: linear-gradient(100deg, var(--gold-soft), var(--gold)); color:#1a1305; border-color: transparent; font-weight:700; }
    .seccion-titulo { font-family: var(--font-display); font-size: 24px; margin: 24px clamp(16px,4vw,40px) 12px; }
    .promos-slider { display:flex; gap:14px; overflow-x:auto; padding: 0 clamp(16px,4vw,40px) 8px; scroll-snap-type: x mandatory; }
    .promo-slide { flex-shrink:0; width: min(300px, 82vw); scroll-snap-align: start; border-radius: var(--radius-lg); overflow:hidden; background: var(--panel); border:1px solid var(--line); cursor:pointer; text-decoration:none; color: var(--text); }
    .promo-slide img { width:100%; height:150px; object-fit:cover; display:block; }
    .promo-slide__info { padding: 12px 14px; }
    .promo-slide__precio { color: var(--gold-soft); font-weight:700; }
    .productos-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(180px,1fr)); gap:16px; padding: 0 clamp(16px,4vw,40px) 60px; }
    .producto-card { background: var(--panel); border:1px solid var(--line); border-radius: var(--radius-md); overflow:hidden; text-decoration:none; color: var(--text); display:flex; flex-direction:column; }
    .producto-card img { width:100%; height:130px; object-fit:cover; }
    .producto-card__info { padding: 12px 14px; }
    .producto-card__nombre { font-weight:700; font-size:14px; margin: 0 0 4px; }
    .producto-card__negocio { font-size:12px; color: var(--text-muted); margin: 0 0 6px; }
    .producto-card__precio { color: var(--gold-soft); font-weight:700; }
  </style>
</head>
<body class="app">
  <header class="feed-topbar">
    <span class="feed-topbar__brand">MI RÍO PRIMERO</span>
    <nav class="feed-topbar__links">
      <a href="perfil.html">Mi perfil</a>
      <button id="logoutBtn">Salir</button>
    </nav>
  </header>

  <div class="categorias-bar" id="categoriasBar"></div>

  <section>
    <h2 class="seccion-titulo">Promociones</h2>
    <div class="promos-slider" id="promosSlider"></div>
  </section>

  <section>
    <h2 class="seccion-titulo">Para vos</h2>
    <div class="productos-grid" id="productosGrid"></div>
    <p class="empty-state" id="feedEmpty" hidden><span>Todavía no hay productos para mostrar.</span></p>
  </section>

  <script type="module" src="../js/cliente-feed.js"></script>
</body>
</html>
