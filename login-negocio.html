<!DOCTYPE html>
<html lang="es-AR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ingresar como Negocio — Mi Río Primero</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0B0F14" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body class="app">
  <main style="max-width: 440px; margin: 0 auto; padding: 60px 20px;">
    <a href="index.html" style="color:var(--text-muted); font-size:13px; text-decoration:none;">← Volver</a>
    <h1 style="font-family: var(--font-display); font-size: 40px; margin: 16px 0 4px;">Panel de Negocio</h1>
    <p style="color: var(--text-muted); margin: 0 0 28px;">Ingresá con el usuario y contraseña que te dio Mi Río Primero.</p>

    <form id="formLogin" class="form panel">
      <div class="field">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" required autocomplete="username" />
      </div>
      <div class="field">
        <label for="password">Contraseña</label>
        <input id="password" name="password" type="password" required autocomplete="current-password" />
      </div>
      <p id="formError" class="form-error"></p>
      <button type="submit" id="submitBtn" class="btn btn--gold btn--block">Ingresar</button>
    </form>

    <p style="color: var(--text-muted); font-size: 13px; margin-top: 20px;">
      ¿Todavía no tenés tu negocio cargado? Escribinos por
      <a href="https://wa.me/5513981763452" target="_blank" rel="noopener" style="color: var(--gold-soft);">WhatsApp</a>.
    </p>
  </main>

  <script type="module" src="js/login-negocio.js"></script>
</body>
</html>
