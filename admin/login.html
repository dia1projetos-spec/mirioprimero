<!DOCTYPE html>
<html lang="es-AR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acceso Administrador — Mi Río Primero</title>
  <link rel="icon" href="../icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/app.css" />
</head>
<body class="app">
  <main style="max-width: 420px; margin: 0 auto; padding: 60px 20px;">
    <h1 style="font-family: var(--font-display); font-size: 36px; margin: 0 0 4px;">Administrador</h1>
    <p style="color: var(--text-muted); margin: 0 0 28px;">Acceso exclusivo al panel de Mi Río Primero.</p>

    <form id="formLogin" class="form panel">
      <div class="field">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" required autocomplete="username" />
      </div>
      <div class="field">
        <label for="password">Contraseña</label>
        <input id="password" name="password" type="password" required autocomplete="current-password" />
      </div>
      <p id="formError" class="form-error"></p>
      <button type="submit" id="submitBtn" class="btn btn--gold btn--block">Ingresar</button>
    </form>
  </main>

  <script type="module" src="../js/admin-login.js"></script>
</body>
</html>
